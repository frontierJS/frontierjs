// ── Project map helpers ───────────────────────────────────────────────────────

function flatUniq(phaseMap = {}) {
  return [...new Set(Object.values(phaseMap).flat())]
}
function detectGap(svc) {
  return !Object.values(svc.hooks?.before ?? {}).flat().includes('authenticate')
}
function gateStr(g) { return g.read + '.' + g.create + '.' + g.update + '.' + g.delete }
function isNullable(prop) {
  if (Array.isArray(prop.type)) return prop.type.includes('null')
  if (prop.anyOf) return prop.anyOf.some(p => p.type === 'null')
  return false
}
function resolveFieldType(prop) {
  const inner = prop.anyOf ? (prop.anyOf.find(p => p.type !== 'null') ?? prop) : prop
  const t = Array.isArray(inner.type) ? inner.type.find(x => x !== 'null') : inner.type
  if (inner.format === 'date-time') return 'DateTime'
  if (inner.format === 'email')     return 'Text'
  if (inner['$ref'])                return inner['$ref'].replace('#/$defs/', '')
  switch (t) {
    case 'integer': return 'Integer'
    case 'number':  return 'Real'
    case 'boolean': return 'Boolean'
    default:        return 'Text'
  }
}
function attrsFromProp(name, prop) {
  const a     = []
  const inner = prop.anyOf ? (prop.anyOf.find(p => p.type !== 'null') ?? prop) : prop
  if (name === 'id')             a.push('@id')
  if (inner.format === 'email')  a.push('@email')
  if (inner['x-trim'])           a.push('@trim')
  if (inner.minLength != null && inner.maxLength != null) a.push('@length(' + inner.minLength + ', ' + inner.maxLength + ')')
  if (inner.minimum != null)     a.push('@gte(' + inner.minimum + ')')
  if (inner.maximum != null)     a.push('@lte(' + inner.maximum + ')')
  if (inner.default != null)     a.push('@default(' + inner.default + ')')
  return a
}

function buildProjectMap(map) {
  const defs      = map.schema?.['$defs'] ?? {}
  const services  = map.services  ?? []
  const resources = map.resources ?? []

  const modelEntries = Object.entries(defs).filter(([, d]) => d.type === 'object' && !d['x-litestone-file'])
  const enumEntries  = Object.entries(defs).filter(([, d]) => d.type === 'string'  && d.enum)

  const dbSchema = {
    enums:  enumEntries.map(([name, d]) => ({ name, values: d.enum })),
    models: modelEntries.map(([name, def]) => ({
      name,
      fields:    Object.entries(def.properties ?? {}).map(([fname, prop]) => ({
        name:     fname,
        type:     resolveFieldType(prop),
        attrs:    attrsFromProp(fname, prop),
        nullable: isNullable(prop),
      })),
      gate:      def['x-gate'] ? gateStr(def['x-gate']) : '?',
      plugins:   def.properties?.deletedAt ? ['softDelete'] : [],
      relations: def['x-relations'] ?? [],
      raw:       '',
    })),
  }

  const channels = services.map(svc => ({
    name:      svc.name,
    service:   svc.name,
    events:    ['created','patched','removed'].map(e => svc.name + ':' + e),
    members:   'all authenticated connections',
    resources: resources.filter(r => r.service === svc.name).map(r => r.name),
  }))

  const relations = []
  for (const [modelName, def] of modelEntries) {
    for (const rel of (def['x-relations'] ?? [])) {
      relations.push({
        from:      modelName,
        fromField: rel.fields?.[0] ?? rel.field,
        to:        rel.model,
        type:      rel.type === 'm2m' ? 'N→N' : 'N→1',
        label:     rel.type === 'm2m' ? '↔ ' + rel.model : '→ ' + rel.model,
        cascade:   rel.onDelete === 'Cascade',
      })
    }
  }

  const healthGaps = []
  for (const svc of services) {
    for (const method of ['create','patch','remove']) {
      const hooks = svc.hooks?.before?.[method] ?? svc.hooks?.before?.all ?? []
      if (!hooks.includes('authenticate')) {
        healthGaps.push({
          type: 'warning',
          msg:  "Service '" + svc.name + "' " + method + " has no authenticate hook",
          ref:  'api.services.' + svc.name + '.hooks.before.' + method + ' → authenticate (missing)',
        })
      }
    }
  }

  const litestoneNouns = dbSchema.models.map(m => ({
    name:    m.name,
    gate:    m.gate,
    fields:  m.fields.length,
    plugins: m.plugins,
  }))

  const junctionNouns = services.map(svc => ({
    name:    svc.name,
    hooks: {
      before: flatUniq(svc.hooks?.before),
      after:  flatUniq(svc.hooks?.after),
    },
    actions: svc.customMethods ?? [],
    gap:     detectGap(svc),
  }))

  const sierraNouns = resources.map(r => ({
    name:    r.name,
    service: r.service ?? null,
    exports: ['store', 'service', 'make', 'load'],
    hooks:   r.hooks ?? [],
  }))

  // Patch real nouns into CHAIN_DATA realms — everything else (nodes, config) stays
  // Sierra is dimmed when no resources exist (no web frontend in this project)
  const chainData = {
    ...CHAIN_DATA,
    realms: CHAIN_DATA.realms.map(realm => {
      if (realm.id === 'litestone') return { ...realm, nouns: litestoneNouns }
      if (realm.id === 'junction')  return { ...realm, nouns: junctionNouns }
      if (realm.id === 'sierra')    return { ...realm, nouns: sierraNouns, empty: sierraNouns.length === 0 }
      return realm
    }),
  }

  // Merge canonical chip data with installation status from project map
  const detectedPkgs = map.packages ?? []
  const packages = TIER1_REGISTRY.map(reg => {
    const detected = detectedPkgs.find(p => p.id === reg.id)
    return {
      ...reg,
      installed: detected ? detected.installed : false,
    }
  })

  return {
    dbSchema,
    chainData,
    channels,
    relations,
    healthGaps,
    packages,
    migrations: (map.migrations ?? []).map(m => ({
      name: m.name, status: 'applied', appliedAt: null, sql: m.sql,
    })),
  }
}

// ── useProjectMap ─────────────────────────────────────────────────────────────

function useProjectMap() {
  const [data,    setData]    = useState(null)
  const [loading, setLoading] = useState(true)
  const [error,   setError]   = useState(null)

  useEffect(() => {
    fetch('/data')
      .then(r => r.json())
      .then(map => { setData(buildProjectMap(map)); setLoading(false) })
      .catch(e  => { setError(e.message);           setLoading(false) })
  }, [])

  return { data, loading, error }
}
